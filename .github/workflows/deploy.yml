name: Deploy to Oracle

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npx prisma generate
      - run: npx tsc --noEmit

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: http://144.24.239.155:3000
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          command_timeout: 15m
          script: |
            set -euo pipefail
            APP_DIR="${HOME}/recipely-backend"

            # Klasör varsa ama .git yoksa (manuel oluşturduğumuz durum)
            if [ -d "$APP_DIR" ] && [ ! -d "$APP_DIR/.git" ]; then
              echo "Directory exists but not a repo. Moving .env and re-cloning..."
              mv "$APP_DIR/.env" /tmp/.recipely_env
              rm -rf "$APP_DIR"
              git clone --branch main --depth 1 "git@github.com:${{ github.repository }}.git" "$APP_DIR"
              mv /tmp/.recipely_env "$APP_DIR/.env"
            elif [ ! -d "$APP_DIR" ]; then
              echo "First-time clone..."
              git clone --branch main --depth 1 "git@github.com:${{ github.repository }}.git" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch --prune origin main
            git reset --hard origin/main

            if [ ! -f .env ]; then
              echo "ERROR: .env is missing!" >&2
              exit 1
            fi

            docker compose up -d --build --remove-orphans
            docker image prune -f

            # Health Check (120 saniyeye çıkardım, 1GB RAM'de build uzun sürebilir)
            for i in $(seq 1 60); do
              if curl -fsS http://127.0.0.1:3000/health >/dev/null; then
                echo "Health check passed!"
                exit 0
              fi
              sleep 2
            done
            exit 1